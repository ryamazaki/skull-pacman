server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Always serve the freshest file — no browser caching during development,
    # so a plain reload (Cmd+R) shows the latest build.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
}
